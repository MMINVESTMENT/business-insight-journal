<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业洞察记录</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase v8 CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <!-- Firebase v8 CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">商业洞察记录</h1>
        <div style="margin: 24px 0;">
            <button class="btn-primary" style="width:100%;font-size:1.3em;padding:1em 0;" onclick="window.location.href='quick-record.html'">
                ＋ 快速记录
            </button>
        </div>
        <div class="main-entry-list">
            <div class="main-entry-item" onclick="window.location.href='decision-review-list.html'">
                <span style="font-size:2em;vertical-align:middle;">📊</span>
                <span style="font-size:1.2em;font-weight:bold;margin-left:12px;">决策复盘</span>
                <span style="float:right;color:#bbb;font-size:1.5em;">&gt;</span>
            </div>
            <div class="main-entry-item" onclick="window.location.href='insight-library.html'">
                <span style="font-size:2em;vertical-align:middle;">🧠</span>
                <span style="font-size:1.2em;font-weight:bold;margin-left:12px;">经验/灵感库</span>
                <span style="float:right;color:#bbb;font-size:1.5em;">&gt;</span>
            </div>
        </div>
        <div style="margin:32px 0 0 0;">
            <button class="btn-secondary" style="width:100%;" onclick="exportRecords()">导出所有记录</button>
        </div>
        <div style="margin:32px 0 0 0;">
            <button class="btn-secondary" style="width:100%;" onclick="logoutUser().then(()=>window.location.href='login.html')">退出登录</button>
        </div>
    </div>
    <script>
        // 未登录自动跳转到登录页
        firebase.auth().onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = "login.html";
            }
        });
        function exportRecords() {
            const reviews = localStorage.getItem('businessDecisionReviews');
            const insights = localStorage.getItem('businessInsights');
            const blob = new Blob([`决策复盘:\n${reviews}\n\n灵感库:\n${insights}`], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'records.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
    <style>
        .main-entry-list {
            margin: 32px 0 0 0;
        }
        .main-entry-item {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px #0001;
            padding: 24px 24px;
            margin-bottom: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 1.1em;
            transition: box-shadow 0.2s;
        }
        .main-entry-item:hover {
            box-shadow: 0 4px 16px #0002;
            background: #f8f8f8;
        }
    </style>
</body>
</html>
