<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业洞察记录</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase scripts：必须在所有自定义 JS 之前 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <!-- 你的自定义 JS -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</head>
<body onload="onPageLoad()">
    <!-- Login Form (shown when not authenticated) -->
    <div id="login-form" style="display: none;">
        <div class="page-container">
            <div class="page-header">
                <h1 class="page-title">商业洞察记录</h1>
            </div>
            <div class="section-spacing">
                <div class="form-section">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="login-email" placeholder="your@email.com">
                </div>
                <div class="form-section">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="login-password" placeholder="密码">
                </div>
                <div class="form-section">
                    <button class="btn-primary" onclick="handleLogin()">登录</button>
                </div>
                <div class="form-section">
                    <button class="btn-secondary" onclick="handleRegister()">注册新账户</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App Content (shown when authenticated) -->
    <div id="app-content" style="display: none;">
        <div class="page-container">
            <div class="page-header">
                <h1 class="page-title">商业洞察记录</h1>
            </div>

            <div class="section-spacing">
                <button class="btn-primary" onclick="window.location.href='quick-record.html'">
                    ＋ 快速记录
                </button>
            </div>

            <div class="section-spacing">
                <div class="card-clickable" onclick="window.location.href='decision-review.html'">
                    <div class="card-icon">📊</div>
                    <div class="card-content">
                        <div class="card-label">决策复盘</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="card-clickable" onclick="window.location.href='insight-library.html'">
                    <div class="card-icon">💡</div>
                    <div class="card-content">
                        <div class="card-label">经验/灵感库</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>
            </div>

            <div class="section-spacing">
                <div class="section-label">数据管理</div>
                <button class="btn-secondary" onclick="exportDataAsJSON()">
                    ⬇️ 导出为 JSON
                </button>
                <div style="margin-top: 8px;">
                    <button class="btn-secondary" onclick="document.getElementById('import-file').click()">
                        ⬆️ 导入数据
                    </button>
                    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importDataFromJSON(this.files[0])">
                </div>
                <div style="margin-top: 16px;">
                    <button class="btn-secondary" onclick="logoutUser()">🚪 登出</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="loading-indicator">
        <div class="page-container">
            <div style="text-align: center; padding: 40px;">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        function onPageLoad() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('app-content').style.display = 'none';

            const checkAuth = setInterval(() => {
                if (window.authInitialized) {
                    clearInterval(checkAuth);
                    document.getElementById('loading').style.display = 'none';
                }
            }, 100);

            setTimeout(() => {
                if (!window.authInitialized) {
                    clearInterval(checkAuth);
                    document.getElementById('loading').style.display = 'none';
                    if (typeof showLoginForm === 'function') {
                        showLoginForm();
                    }
                }
            }, 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await loginUser(email, password);
            } catch (error) {
                alert('登录失败: ' + error.message);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await registerUser(email, password);
            } catch (error) {
                alert('注册失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
