<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业洞察记录</title>
    <link rel="stylesheet" href="style.css">

    <!-- Firebase v8 CDN scripts (全局风格，顺序不能错) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- 配置和主逻辑 -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <!-- 登录表单区域 -->
    <div id="login-form" class="page-container">
        <div class="page-header">
            <h1 class="page-title">商业洞察记录</h1>
        </div>
        <div class="section-spacing">
            <div class="form-section">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-section">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="login-password" placeholder="密码">
            </div>
            <div class="form-section">
                <button class="btn-primary" onclick="handleLogin()">登录</button>
            </div>
            <div class="form-section">
                <button class="btn-secondary" onclick="handleRegister()">注册新账户</button>
            </div>
        </div>
    </div>

    <!-- 主内容区域（登录后显示） -->
    <div id="main-content" class="page-container" style="display:none;">
        <div class="page-header">
            <h1 class="page-title">欢迎，您已登录！</h1>
        </div>
        <div class="section-spacing">
            <p>这里是主内容区。你可以在这里放置你的主页面内容，或跳转到其他页面。</p>
            <button class="btn-secondary" onclick="logoutUser().then(()=>location.reload())">退出登录</button>
        </div>
    </div>
    <script>
        function handleLogin() {
            var email = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            loginUser(email, password)
                .then(function() {
                    alert('登录成功');
                    // 登录成功后自动切换内容
                    showMainContent();
                })
                .catch(function(error) {
                    alert('登录失败: ' + error.message);
                });
        }
        function handleRegister() {
            var email = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            registerUser(email, password)
                .then(function() {
                    alert('注册成功');
                    showMainContent();
                })
                .catch(function(error) {
                    alert('注册失败: ' + error.message);
                });
        }
        // 切换内容显示
        function showMainContent() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }
        // 页面加载时根据登录状态切换内容
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                showMainContent();
            } else {
                showLoginForm();
            }
        });
    </script>
</body>
</html>
