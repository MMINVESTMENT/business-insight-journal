<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验/灵感库</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- Back Button & Title -->
        <div class="page-header">
            <a href="index.html" class="back-link">← 返回</a>
            <h1 class="page-title">经验/灵感库</h1>
        </div>

        <!-- Category List -->
        <div class="section-spacing" id="categories-container">
            <!-- Categories will be populated here -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function loadCategories() {
            const categories = [
                '仓库管理',
                '进货渠道',
                '出货渠道',
                'PDD',
                '淘宝店',
                '抖音',
                '得物'
            ];

            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'card-clickable';
                card.style.marginBottom = '12px';
                card.style.cursor = 'pointer';
                card.onclick = () => {
                    window.location.href = `detail-entry.html?category=${encodeURIComponent(cat)}`;
                };

                // Emoji map for categories
                const emojiMap = {
                    '仓库管理': '📦',
                    '进货渠道': '📥',
                    '出货渠道': '📤',
                    'PDD': '🛒',
                    '淘宝店': '🏪',
                    '抖音': '🎵',
                    '得物': '👟'
                };

                card.innerHTML = `
                    <div class="card-icon">${emojiMap[cat] || '📝'}</div>
                    <div class="card-content">
                        <div class="card-label">${cat}</div>
                    </div>
                    <div class="card-arrow">›</div>
                `;

                container.appendChild(card);
            });
        }

        loadCategories();
    </script>
</body>
</html>
