<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验/灵感库</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase v8 CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <a href="index.html" class="back-link">← 返回</a>
            <h1 class="page-title">经验/灵感库</h1>
        </div>
        <div id="category-list" class="section-spacing"></div>
    </div>
    <script>
        // 只显示所有分类列表
        function renderCategoryList() {
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) {
                    document.getElementById('category-list').innerHTML = '<p>请先登录</p>';
                    return;
                }
                firebase.firestore()
                    .collection('users').doc(user.uid)
                    .collection('insights')
                    .get()
                    .then(snapshot => {
                        const categories = {};
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            if (!categories[data.category]) categories[data.category] = 0;
                            categories[data.category]++;
                        });
                        const categoryNames = Object.keys(categories);
                        if (categoryNames.length === 0) {
                            document.getElementById('category-list').innerHTML = '<p>暂无记录</p>';
                            return;
                        }
                        // Emoji map
                        const emojiMap = {
                            '仓库管理': '📦',
                            '进货渠道': '📥',
                            '出货渠道': '📤',
                            'PDD': '🛒',
                            '淘宝店': '🏪',
                            '抖音': '🎵',
                            '得物': '👟'
                        };
                        let html = '';
                        categoryNames.forEach(cat => {
                            html += `
                                <div class="card-clickable" style="margin-bottom:16px;cursor:pointer;" onclick="window.location.href='detail-entry.html?category=${encodeURIComponent(cat)}'">
                                    <div style="font-size:1.1em;">
                                        ${emojiMap[cat] || '📝'} <b>${cat}</b> <span style="color:#bbb;font-size:0.95em;">(${categories[cat]}条)</span>
                                    </div>
                                </div>
                            `;
                        });
                        document.getElementById('category-list').innerHTML = html;
                    });
            });
        }
        renderCategoryList();
    </script>
</body>
</html>
