<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策复盘详情</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase v8 CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <!-- Quill 富文本编辑器 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <a href="decision-review-list.html" class="back-link">← 返回</a>
            <h1 class="page-title">决策复盘详情</h1>
        </div>
        <div class="section-spacing">
            <div class="form-section">
                <label class="form-label">市场判断</label>
                <div id="market-judgment" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <label class="form-label">选品复盘</label>
                <div id="logic-reasoning" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <label class="form-label">执行情况</label>
                <div id="execution-status" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <label class="form-label">问题/反思</label>
                <div id="problems-reflection" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <label class="form-label">总结</label>
                <div id="summary" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <button type="button" class="btn-primary" onclick="saveReview()">保存</button>
            </div>
        </div>
        <div id="success-message" class="success-message" style="display: none;">保存成功</div>
    </div>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 初始化富文本编辑器
        const editors = {};
        ['market-judgment', 'logic-reasoning', 'execution-status', 'problems-reflection', 'summary'].forEach(id => {
            editors[id] = new Quill('#' + id, {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image', 'code-block', 'table']
                    ]
                }
            });
        });

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function loadReview() {
            const year = getUrlParam('year');
            const month = getUrlParam('month');
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) return;
                firebase.firestore()
                    .collection('users').doc(user.uid)
                    .collection('decisionReviews').doc(`${year}-${month}`)
                    .get()
                    .then(doc => {
                        if (doc.exists) {
                            const review = doc.data();
                            editors['market-judgment'].root.innerHTML = review.marketJudgment || '';
                            editors['logic-reasoning'].root.innerHTML = review.logicReasoning || '';
                            editors['execution-status'].root.innerHTML = review.executionStatus || '';
                            editors['problems-reflection'].root.innerHTML = review.problemsReflection || '';
                            editors['summary'].root.innerHTML = review.summary || '';
                        }
                    });
            });
        }

        function saveReview() {
            const year = getUrlParam('year');
            const month = getUrlParam('month');
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) return alert('请先登录');
                const entry = {
                    id: `decision-${year}-${month}`,
                    year: year,
                    month: month,
                    marketJudgment: editors['market-judgment'].root.innerHTML,
                    logicReasoning: editors['logic-reasoning'].root.innerHTML,
                    executionStatus: editors['execution-status'].root.innerHTML,
                    problemsReflection: editors['problems-reflection'].root.innerHTML,
                    summary: editors['summary'].root.innerHTML,
                    createdAt: new Date().toISOString()
                };
                firebase.firestore()
                    .collection('users').doc(user.uid)
                    .collection('decisionReviews').doc(`${year}-${month}`)
                    .set(entry)
                    .then(() => {
                        document.getElementById('success-message').style.display = 'block';
                        setTimeout(() => {
                            document.getElementById('success-message').style.display = 'none';
                        }, 1500);
                    });
            });
        }

        loadReview();
    </script>
    <style>
        .quill-editor {
            background: #fff;
            min-height: 80px;
            margin-bottom: 12px;
        }
    </style>
</body>
</html>
