<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵感/经验详情</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase v8 CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <!-- Quill 富文本编辑器 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <div class="page-header">
            <a href="insight-library.html" class="back-link">← 返回</a>
            <h1 class="page-title" id="category-title">灵感/经验详情</h1>
            <button id="new-entry-btn" class="btn-secondary" style="float:right;margin-top:-40px;" onclick="newEntry()">＋ 新建</button>
        </div>
        <div class="section-spacing">
            <div class="section-label">本分类下所有记录</div>
            <ol id="entries-list" style="margin: 16px 0 32px 24px;"></ol>
        </div>
        <!-- 只读模式 -->
        <div id="readonly-section" class="section-spacing" style="display:none;">
            <div class="form-section">
                <label class="form-label">标题</label>
                <div id="readonly-title" style="font-size:1.2em;font-weight:bold;"></div>
            </div>
            <div class="form-section">
                <label class="form-label">内容</label>
                <div id="readonly-content" style="background:#fff;min-height:120px;padding:12px;border-radius:8px;"></div>
            </div>
            <div class="form-section">
                <span id="readonly-date" style="color:#bbb;font-size:0.95em;"></span>
            </div>
            <div class="form-section">
                <button class="btn-primary" onclick="enterEditMode()">编辑</button>
            </div>
        </div>
        <!-- 编辑模式 -->
        <div id="edit-section" class="section-spacing" style="display:none;">
            <div class="form-section">
                <label class="form-label">标题（可选）</label>
                <input type="text" class="form-input" id="insight-title" placeholder="输入标题...">
            </div>
            <div class="form-section">
                <label class="form-label">内容</label>
                <div id="insight-content" class="quill-editor"></div>
            </div>
            <div class="form-section">
                <button type="button" class="btn-primary" onclick="saveInsightEntry()">保存</button>
                <button type="button" class="btn-secondary" onclick="cancelEdit()" style="margin-left:16px;">取消</button>
            </div>
        </div>
        <div id="success-message" class="success-message" style="display: none;">保存成功</div>
    </div>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 初始化富文本编辑器
        const quill = new Quill('#insight-content', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image', 'code-block', 'table']
                ]
            }
        });

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        let currentId = null;
        let currentCategory = decodeURIComponent(getUrlParam('category') || '');
        let entriesCache = [];

        function renderEntriesList() {
            document.getElementById('category-title').textContent = currentCategory || '灵感/经验详情';
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) {
                    document.getElementById('entries-list').innerHTML = '<li>请先登录</li>';
                    return;
                }
                firebase.firestore()
                    .collection('users').doc(user.uid)
                    .collection('insights')
                    .where('category', '==', currentCategory)
                    .orderBy('createdAt', 'desc')
                    .get()
                    .then(snapshot => {
                        entriesCache = [];
                        const list = document.getElementById('entries-list');
                        list.innerHTML = '';
                        snapshot.forEach(doc => {
                            const entry = { id: doc.id, ...doc.data() };
                            entriesCache.push(entry);
                            const li = document.createElement('li');
                            li.style.marginBottom = '12px';
                            li.style.cursor = 'pointer';
                            li.innerHTML = `<b>${entry.title || '无标题'}</b> <span style="color:#bbb;font-size:0.95em;">${entry.createdAt ? entry.createdAt.split('T')[0] : ''}</span>`;
                            li.onclick = () => showReadonly(entry.id);
                            list.appendChild(li);
                        });
                    });
            });
        }

        function showReadonly(id) {
            const entry = entriesCache.find(e => e.id === id);
            if (entry) {
                document.getElementById('readonly-title').textContent = entry.title || '无标题';
                document.getElementById('readonly-content').innerHTML = entry.content || '';
                document.getElementById('readonly-date').textContent = entry.createdAt ? entry.createdAt.split('T')[0] : '';
                currentId = id;
                document.getElementById('readonly-section').style.display = '';
                document.getElementById('edit-section').style.display = 'none';
            }
        }

        function enterEditMode() {
            const entry = entriesCache.find(e => e.id === currentId);
            if (entry) {
                document.getElementById('insight-title').value = entry.title || '';
                quill.root.innerHTML = entry.content || '';
            }
            document.getElementById('readonly-section').style.display = 'none';
            document.getElementById('edit-section').style.display = '';
        }

        function cancelEdit() {
            showReadonly(currentId);
        }

        function newEntry() {
            currentId = null;
            document.getElementById('insight-title').value = '';
            quill.root.innerHTML = '';
            document.getElementById('readonly-section').style.display = 'none';
            document.getElementById('edit-section').style.display = '';
        }

        function saveInsightEntry() {
            const title = document.getElementById('insight-title').value;
            const content = quill.root.innerHTML;
            firebase.auth().onAuthStateChanged(function(user) {
                if (!user) return alert('请先登录');
                if (currentId) {
                    // 修改
                    firebase.firestore()
                        .collection('users').doc(user.uid)
                        .collection('insights').doc(currentId)
                        .update({
                            title: title,
                            content: content,
                            createdAt: new Date().toISOString(),
                            category: currentCategory
                        })
                        .then(() => {
                            showSuccessMessage();
                            renderEntriesList();
                            showReadonly(currentId);
                        });
                } else {
                    // 新增
                    firebase.firestore()
                        .collection('users').doc(user.uid)
                        .collection('insights')
                        .add({
                            title: title,
                            content: content,
                            createdAt: new Date().toISOString(),
                            category: currentCategory
                        })
                        .then(docRef => {
                            currentId = docRef.id;
                            showSuccessMessage();
                            renderEntriesList();
                            showReadonly(currentId);
                        });
                }
            });
        }

        function showSuccessMessage() {
            const msg = document.getElementById('success-message');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }

        // 页面初始化
        renderEntriesList();
        // 如果有id参数，自动加载
        const urlId = getUrlParam('id');
        if (urlId) {
            setTimeout(() => showReadonly(urlId), 800);
        }

    </script>
    <style>
        .quill-editor {
            background: #fff;
            min-height: 120px;
            margin-bottom: 12px;
        }
    </style>
</body>
</html>
